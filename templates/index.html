<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Training</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Contact Form</h1>

    <form action="/submit" method="POST">

        <label>Name</label>

        <input
            type="text"
            name="username"
            placeholder="Enter your name"
            required>

        <label>Message</label>

        <textarea
            name="message"
            rows="5"
            placeholder="Enter your message"
            required></textarea>

        <button type="submit">
            Submit
        </button>

    </form>

</div>

</body>
</html>
